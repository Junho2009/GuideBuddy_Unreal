release_blocking_checks:
  - id: SPEC_SYNC
    title: specs 与 contracts 目标一致
    automation_level: hybrid
    blocking: true
    stimulus: 读取 MVP05 prose 与本合同组。
    observe: 硬编码翻滚躲避训练场范围、非目标、验收路径。
    oracle: 不存在仍要求本轮必须读取 drill_spec.json 的冲突描述。
    evidence: aiflow/contracts/runs/MVP05_DRILL_ARENA_RUNTIME.run-001.yaml
    on_fail: 先同步 specs 或合同，再继续实现。
  - id: CPP_BUILD
    title: Unreal C++ 编译通过
    automation_level: auto
    blocking: true
    stimulus: 运行项目 UnrealEditor 目标构建。
    observe: 构建退出码和日志。
    oracle: 构建退出码为 0。
    evidence: Saved/Automation/MVP05_DRILL_ARENA_RUNTIME/build.log
    on_fail: 修复 C++ 编译错误。
  - id: TYPESCRIPT_BUILD
    title: TypeScript 构建通过
    automation_level: auto
    blocking: true
    stimulus: 运行 npm run build:guidebuddy。
    observe: tsc 退出码。
    oracle: 退出码为 0。
    evidence: aiflow/contracts/runs/MVP05_DRILL_ARENA_RUNTIME.run-001.yaml
    on_fail: 修复 TypeScript 类型或编译输出。
  - id: MAP_ASSET_PRESENT
    title: 训练场地图资产存在
    automation_level: auto
    blocking: true
    stimulus: 检查 Content/GuideBuddy/Maps/GuideBuddyDodgeTrainingArena.umap。
    observe: 文件存在。
    oracle: 训练场 umap 存在。
    evidence: Content/GuideBuddy/Maps/GuideBuddyDodgeTrainingArena.umap
    on_fail: 复制或生成训练场地图。
  - id: CONFIG_DEFAULT
    title: 连续成功次数默认配置
    automation_level: auto
    blocking: true
    stimulus: 读取 Config/DefaultGame.ini。
    observe: GuideBuddyDodgeTraining.RequiredSuccessfulDodges。
    oracle: 默认值为 5。
    evidence: Config/DefaultGame.ini
    on_fail: 补齐配置。
manual_smoke_checks:
  - id: HUMAN_ENTER_TRAINING
    title: 从正式场景进入训练场
    automation_level: manual
    blocking: false
    stimulus: 人类运行 SampleDemoShowcaseMap 并点击右上角进入训练场。
    observe: 是否进入训练场并看到左上角训练要点。
    oracle: 玩家能明确开始翻滚躲避训练。
    evidence: aiflow/contracts/evidence/MVP05_DRILL_ARENA_RUNTIME/v0.1/run-001/index.md
    on_fail: 调整入口或 HUD。
  - id: HUMAN_COMPLETE_AND_RETURN
    title: 完成训练并返回正式场景
    automation_level: manual
    blocking: false
    stimulus: 连续成功躲避达到目标次数后点击返回按钮。
    observe: 完成弹窗和返回正式场景。
    oracle: 弹窗出现且返回 SampleDemoShowcaseMap 成功。
    evidence: aiflow/contracts/evidence/MVP05_DRILL_ARENA_RUNTIME/v0.1/run-001/index.md
    on_fail: 调整完成判定或返回路径。
