id: MVP04_ADAPTIVE_DRILL_GENERATION
baseline_id: MVP04_ADAPTIVE_DRILL_GENERATION@v0.1
status: active
brief_ref: aiflow/contracts/briefs/MVP04_ADAPTIVE_DRILL_GENERATION.brief.yaml
manifest_ref: aiflow/contracts/manifests/MVP04_ADAPTIVE_DRILL_GENERATION.manifest.yaml
verifier_ref: aiflow/contracts/verifiers/MVP04_ADAPTIVE_DRILL_GENERATION.verifier.yaml
objective: 把 MVP03 Drill Spec candidate 编译成可验证、可追溯、可由 UE 白名单模板消费的正式 Drill Spec 与 Drill Session。
execution_notes:
  - 第一版只支持 single_enemy_execution_response。
  - 自动验收基于已归档 MVP03 evidence，不依赖打开 Unreal Editor。
  - TypeScript 生成器必须拒绝危险字段和非白名单字段。
tasks:
  - id: T01_DEFINE_DRILL_SCHEMA
    title: 定义 drill_spec.json 与 drill_session.json
    intent: 固定正式 Drill Spec、session 来源链路、模板参数和安全边界。
    expected_result: MVP05 和 UE 运行时可以稳定读取 session 元数据。
  - id: T02_IMPLEMENT_VALIDATOR
    title: 实现 candidate 白名单验证器
    intent: 拒绝未知模板、未知参数、危险字段、危险字符串和证据不足输入。
    expected_result: MVP04 不接受自由形式关卡指令。
  - id: T03_IMPLEMENT_NORMALIZER
    title: 实现正式 Drill Spec 规范化
    intent: 将 MVP03 candidate 参数收敛到受控范围和固定模板语义。
    expected_result: 输出 deterministic 的 drill_spec.json。
  - id: T04_ADD_CLI_AND_RUNTIME_WRITE
    title: 增加 CLI 与运行时写出
    intent: 支持 npm run drill:mvp04，也让 guide request 快照可写出 drill 文件。
    expected_result: 本地 verifier 和运行时快照都能消费同一套生成器。
  - id: T05_WRITE_VERIFIER
    title: 增加 MVP04 verifier
    intent: 自动检查 happy path、拒绝路径、归档 evidence、run 与 ledger。
    expected_result: npm run verify:mvp04 通过并留证。
scope_guard:
  allowed:
    - 新增 TypeScript/GuideBuddy/drill.ts。
    - 新增 Content/JavaScript/GuideBuddy/drill.js 编译产物。
    - 更新 TypeScript/GuideBuddy/main.ts 与编译产物以写出 drill artifacts。
    - 新增 MVP04 contracts、verifier、run、evidence 与 ledger。
    - 更新 package.json npm scripts。
    - 同步 aiflow 上下文与阶段状态。
  forbidden:
    - 修改二进制 Blueprint 图。
    - 生成或执行控制台命令。
    - 接受任意 Unreal 资产路径或类名。
    - 修改战斗数值。
sync_requirements:
  - 更新 aiflow/CONTEXT.md 当前执行基线。
  - 更新 aiflow/specs/GAME_PHASES.md 的 MVP04 状态。
  - 更新 aiflow/specs/MVP04_ADAPTIVE_DRILL_GENERATION.md 当前状态。
  - 归档 verifier evidence、run record 与 result ledger。
